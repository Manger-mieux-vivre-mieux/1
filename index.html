<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manger Mieux, Vivre Mieux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cormorant Garamond', serif; background-color: #FDFCF8; color: #333; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center px-8 py-6 border-b border-[#E8E4D9]">
        <div class="text-2xl font-bold font-sans text-emerald-800 tracking-tight">NUTRI<span class="text-emerald-500 italic font-serif">Vie</span></div>
        <button class="bg-emerald-800 text-white px-6 py-2 rounded-full font-sans text-sm font-medium">Rejoindre</button>
    </header>
    <main class="max-w-7xl mx-auto px-8 py-20 text-center">
        <h1 class="text-6xl md:text-8xl leading-tight mb-8">
            Manger <span class="italic text-emerald-600">mieux</span>,<br> vivre <span class="italic text-emerald-600 font-sans font-bold">mieux</span>.
        </h1>
        <p class="text-xl md:text-2xl font-sans font-light opacity-60 max-w-2xl mx-auto mb-12">
            Découvrez l'art de la nutrition consciente pour transformer votre corps et votre esprit au quotidien.
        </p>
        <button class="bg-[#5A5A40] text-white px-10 py-5 rounded-full font-sans text-lg font-medium shadow-xl">Commencer l'aventure</button>
    </main>
</body>
</html>
